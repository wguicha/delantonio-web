services:
  - type: web
    name: delantonio-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PIZZERIA_LAT
        value: "36.7213"
      - key: PIZZERIA_LNG
        value: "-4.4213"
      - key: MAX_ORDER_RADIUS_KM
        value: "50"
      - key: ORDER_RATE_LIMIT_WINDOW_MS
        value: "3600000"
      - key: ORDER_RATE_LIMIT_MAX
        value: "5"
